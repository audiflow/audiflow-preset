# Audiflow Smartplaylist Workflow Schema Version Upgrade And Pattern Migration

## Action

Follow the schema-version-upgrade-and-pattern-migration workflow:
1. Update schema/playlist-definition.schema.json to new version.
2. Update schema/VERSION and related docs (e.g., schema-reference.md).
3. Update patterns/meta.json to reference new schema fields.
4. Migrate all patterns/*/playlists/*.json files to new schema syntax.
5. Optionally update patterns/*/meta.json for new fields or order.
6. Commit all changes together.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: schema/playlist-definition.schema.json, schema/VERSION, .claude/skills/audiflow-playlist/references/schema-reference.md

