name: Deploy to Pages

on:
  push:
    tags:
      - "prod/v*.*"
      - "dev/v*.*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact_id }}
    steps:
      - name: Checkout main (workflow + scripts)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Fetch all matching tags
        run: |
          git fetch --tags --quiet origin \
            "+refs/tags/prod/*:refs/tags/prod/*" \
            "+refs/tags/dev/*:refs/tags/dev/*"

      - name: Build deploy tree from tags
        run: bash scripts/ci/build-pages-tree.sh . _site

      - name: Upload Pages artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
